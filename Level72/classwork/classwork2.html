<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
*{
    box-sizing: border-box;
    margin: 0;
    padding:0 ;
}

body{
background: #eaffea;
font-family: sans-serif;



}
.grid-conteiner{
    display: grid;
    grid-template-columns: 1fr 3fr 3fr;
    grid-template-rows: auto auto auto auto;
    gap: 15px;
    padding: 20px;

}

.grid-conteiner > div{
    background: #33ff33;
    border: 2px solid #000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bald;
}

.header{
    grid-column: 1 / -1;
    height: 80px;
}


.sidebar{
    grid-row: 2 / 4;

}

.content1{
    grid-column: 2 / -1;
    height: 120px;
}
.content2{
    height: 120px;

}

.content3{
    height: 120px;
}

.footer{
    grid-column: 1 / -1;
    height: 80px;
}
</style>




</head>
<body>
    <div class="grid-conteiner">
        <div class="box header">header</div>
        <div class=" box sidebar">sidebar</div>
        <div class="box content1">content1</div>
        <div class="box content2">content2</div>
        <div class="box content3">content3</div>
        <div class="box footer">footer</div>
    </div>
</body>
</html>
